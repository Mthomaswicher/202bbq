name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FORMSPREE_ORDERS: ${{ secrets.VITE_FORMSPREE_ORDERS }}
          VITE_FORMSPREE_REVIEWS: ${{ secrets.VITE_FORMSPREE_REVIEWS }}
          VITE_STRIPE_DEPOSIT_LINK: ${{ secrets.VITE_STRIPE_DEPOSIT_LINK }}

      - name: Deploy
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          npx gh-pages --dist dist --dotfiles --message "Deploy [skip ci]"
