<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>202BBQ — Page redirecting…</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <script>
    // GitHub Pages SPA redirect: rewrite any sub-path to the SPA at root with
    // a query fragment so the client router can render the right section.
    (function () {
      var segmentCount = 0; // custom domain served from root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body>
  <noscript>
    <h1>202BBQ</h1>
    <p>This page has moved. <a href="/">Go to the 202BBQ home page.</a></p>
  </noscript>
</body>
</html>
